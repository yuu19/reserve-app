name: Deploy Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-workers-production
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  PNPM_VERSION: 10.28.2

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --filter @apps/backend test

      - name: Run web server tests
        run: pnpm --filter @apps/web test

      - name: Build backend worker
        run: pnpm --filter @apps/backend build

      - name: Build web worker
        run: pnpm --filter @apps/web build

      - name: Build docs worker
        run: pnpm --filter @apps/docs build

  deploy:
    name: Deploy production workers
    runs-on: ubuntu-latest
    needs:
      - preflight
    environment: production
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      PUBLIC_SENTRY_DSN_WEB: ${{ vars.PUBLIC_SENTRY_DSN_WEB }}
      PUBLIC_SENTRY_ENVIRONMENT: ${{ vars.PUBLIC_SENTRY_ENVIRONMENT }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT_WEB: ${{ vars.SENTRY_PROJECT_WEB }}
      SERVICE_IMAGE_UPLOAD_SIGNING_SECRET: ${{ secrets.SERVICE_IMAGE_UPLOAD_SIGNING_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production deploy inputs
        run: |
          required_names=(
            BETTER_AUTH_SECRET
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            PUBLIC_SENTRY_DSN_WEB
            PUBLIC_SENTRY_ENVIRONMENT
            RESEND_API_KEY
            RESEND_FROM_EMAIL
            SENTRY_AUTH_TOKEN
            SENTRY_DSN_BACKEND
            SENTRY_ORG
            SENTRY_PROJECT_WEB
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
          )

          for name in "${required_names[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required deploy secret or variable: ${name}"
              exit 1
            fi
          done

          if [ -n "${GOOGLE_CLIENT_ID}" ] && [ -z "${GOOGLE_CLIENT_SECRET}" ]; then
            echo "GOOGLE_CLIENT_SECRET is required when GOOGLE_CLIENT_ID is set."
            exit 1
          fi

          if [ -z "${GOOGLE_CLIENT_ID}" ] && [ -n "${GOOGLE_CLIENT_SECRET}" ]; then
            echo "GOOGLE_CLIENT_ID is required when GOOGLE_CLIENT_SECRET is set."
            exit 1
          fi

      - name: Verify Cloudflare authentication
        run: pnpm --filter @apps/backend exec wrangler whoami

      - name: Sync backend secrets
        run: |
          printf '%s' "${BETTER_AUTH_SECRET}" | pnpm --filter @apps/backend exec wrangler secret put BETTER_AUTH_SECRET
          printf '%s' "${RESEND_API_KEY}" | pnpm --filter @apps/backend exec wrangler secret put RESEND_API_KEY
          printf '%s' "${RESEND_FROM_EMAIL}" | pnpm --filter @apps/backend exec wrangler secret put RESEND_FROM_EMAIL
          printf '%s' "${STRIPE_SECRET_KEY}" | pnpm --filter @apps/backend exec wrangler secret put STRIPE_SECRET_KEY
          printf '%s' "${STRIPE_WEBHOOK_SECRET}" | pnpm --filter @apps/backend exec wrangler secret put STRIPE_WEBHOOK_SECRET
          printf '%s' "${SENTRY_DSN_BACKEND}" | pnpm --filter @apps/backend exec wrangler secret put SENTRY_DSN_BACKEND

          if [ -n "${GOOGLE_CLIENT_ID}" ]; then
            printf '%s' "${GOOGLE_CLIENT_ID}" | pnpm --filter @apps/backend exec wrangler secret put GOOGLE_CLIENT_ID
            printf '%s' "${GOOGLE_CLIENT_SECRET}" | pnpm --filter @apps/backend exec wrangler secret put GOOGLE_CLIENT_SECRET
          fi

          if [ -n "${SERVICE_IMAGE_UPLOAD_SIGNING_SECRET}" ]; then
            printf '%s' "${SERVICE_IMAGE_UPLOAD_SIGNING_SECRET}" | pnpm --filter @apps/backend exec wrangler secret put SERVICE_IMAGE_UPLOAD_SIGNING_SECRET
          fi

      - name: Run D1 migrations (remote)
        run: pnpm --filter @apps/backend run d1:migrate:remote

      - name: Deploy backend worker
        run: |
          pnpm --filter @apps/backend exec wrangler deploy \
            --var "SENTRY_RELEASE:${GITHUB_SHA}"

      - name: Build web worker with Sentry release
        env:
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT_WEB }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: pnpm --filter @apps/web build

      - name: Deploy web worker
        run: |
          pnpm --filter @apps/web exec wrangler deploy \
            --var "PUBLIC_SENTRY_DSN_WEB:${PUBLIC_SENTRY_DSN_WEB}" \
            --var "PUBLIC_SENTRY_ENVIRONMENT:${PUBLIC_SENTRY_ENVIRONMENT}" \
            --var "PUBLIC_SENTRY_RELEASE:${GITHUB_SHA}"

      - name: Build docs worker
        run: pnpm --filter @apps/docs build

      - name: Deploy docs worker
        run: pnpm --filter @apps/docs exec wrangler deploy

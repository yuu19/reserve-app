name: Deploy Workers

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'apps/docs/**'
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        type: choice
        options:
          - all
          - backend
          - docs
          - web
        default: all

permissions:
  contents: read

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect deploy targets
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      docs: ${{ steps.filter.outputs.docs }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.github/workflows/deploy-workers.yml'
            docs:
              - 'apps/docs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.github/workflows/deploy-workers.yml'
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.github/workflows/deploy-workers.yml'

  deploy-backend:
    name: Deploy backend worker
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'backend')) || (github.event_name == 'push' && needs.changes.outputs.backend == 'true') }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate backend deploy inputs
        run: |
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || (echo "Missing secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" || (echo "Missing secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "${{ secrets.BETTER_AUTH_SECRET }}" || (echo "Missing secret: BETTER_AUTH_SECRET" && exit 1)
          test -n "${{ secrets.SENTRY_DSN_BACKEND }}" || (echo "Missing secret: SENTRY_DSN_BACKEND" && exit 1)
          test -n "${{ vars.BETTER_AUTH_URL }}" || (echo "Missing variable: BETTER_AUTH_URL" && exit 1)
          test -n "${{ vars.BETTER_AUTH_TRUSTED_ORIGINS }}" || (echo "Missing variable: BETTER_AUTH_TRUSTED_ORIGINS" && exit 1)
          test -n "${{ vars.BETTER_AUTH_COOKIE_DOMAIN }}" || (echo "Missing variable: BETTER_AUTH_COOKIE_DOMAIN" && exit 1)
          test -n "${{ vars.SENTRY_ENVIRONMENT }}" || (echo "Missing variable: SENTRY_ENVIRONMENT" && exit 1)

      - name: Sync BETTER_AUTH_SECRET
        run: |
          printf '%s' "${{ secrets.BETTER_AUTH_SECRET }}" | pnpm --filter @apps/backend exec wrangler secret put BETTER_AUTH_SECRET

      - name: Sync SENTRY_DSN_BACKEND
        run: |
          printf '%s' "${{ secrets.SENTRY_DSN_BACKEND }}" | pnpm --filter @apps/backend exec wrangler secret put SENTRY_DSN_BACKEND

      - name: Run D1 migrations (remote)
        run: pnpm --filter @apps/backend run d1:migrate:remote

      - name: Deploy backend worker
        run: |
          pnpm --filter @apps/backend exec wrangler deploy \
            --keep-vars \
            --var "BETTER_AUTH_URL:${{ vars.BETTER_AUTH_URL }}" \
            --var "BETTER_AUTH_TRUSTED_ORIGINS:${{ vars.BETTER_AUTH_TRUSTED_ORIGINS }}" \
            --var "BETTER_AUTH_COOKIE_DOMAIN:${{ vars.BETTER_AUTH_COOKIE_DOMAIN }}" \
            --var "SENTRY_ENVIRONMENT:${{ vars.SENTRY_ENVIRONMENT }}" \
            --var "SENTRY_RELEASE:${{ github.sha }}"

  deploy-web:
    name: Deploy web worker
    runs-on: ubuntu-latest
    needs:
      - changes
      - deploy-backend
    if: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'web')) || (github.event_name == 'push' && needs.changes.outputs.web == 'true')) && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate web deploy inputs
        run: |
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || (echo "Missing secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" || (echo "Missing secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "${{ secrets.SENTRY_AUTH_TOKEN }}" || (echo "Missing secret: SENTRY_AUTH_TOKEN" && exit 1)
          test -n "${{ vars.SENTRY_ORG }}" || (echo "Missing variable: SENTRY_ORG" && exit 1)
          test -n "${{ vars.SENTRY_PROJECT_WEB }}" || (echo "Missing variable: SENTRY_PROJECT_WEB" && exit 1)
          test -n "${{ vars.PUBLIC_BACKEND_URL }}" || (echo "Missing variable: PUBLIC_BACKEND_URL" && exit 1)
          test -n "${{ vars.PUBLIC_SENTRY_DSN_WEB }}" || (echo "Missing variable: PUBLIC_SENTRY_DSN_WEB" && exit 1)
          test -n "${{ vars.PUBLIC_SENTRY_ENVIRONMENT }}" || (echo "Missing variable: PUBLIC_SENTRY_ENVIRONMENT" && exit 1)

      - name: Build web worker
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_WEB }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: pnpm --filter @apps/web build

      - name: Deploy web worker
        run: |
          pnpm --filter @apps/web exec wrangler deploy \
            --keep-vars \
            --var "PUBLIC_BACKEND_URL:${{ vars.PUBLIC_BACKEND_URL }}" \
            --var "PUBLIC_SENTRY_DSN_WEB:${{ vars.PUBLIC_SENTRY_DSN_WEB }}" \
            --var "PUBLIC_SENTRY_ENVIRONMENT:${{ vars.PUBLIC_SENTRY_ENVIRONMENT }}" \
            --var "PUBLIC_SENTRY_RELEASE:${{ github.sha }}"

  deploy-docs:
    name: Deploy docs worker
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'docs')) || (github.event_name == 'push' && needs.changes.outputs.docs == 'true') }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate docs deploy inputs
        run: |
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || (echo "Missing secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" || (echo "Missing secret: CLOUDFLARE_API_TOKEN" && exit 1)

      - name: Build docs worker
        run: pnpm --filter @apps/docs build

      - name: Deploy docs worker
        run: pnpm --filter @apps/docs exec wrangler deploy --keep-vars

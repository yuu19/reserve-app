name: CI Tests

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'apps/docs/**'
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/ci-tests.yml'
      - '.github/workflows/deploy-workers.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'apps/docs/**'
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/ci-tests.yml'
      - '.github/workflows/deploy-workers.yml'

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --filter @apps/backend test

      - name: Run web server tests
        run: pnpm --filter @apps/web test

      - name: Build docs worker
        run: pnpm --filter @apps/docs build

  docs-e2e:
    name: docs-e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @apps/docs exec playwright install --with-deps chromium

      - name: Run docs Playwright E2E
        run: pnpm --filter @apps/docs test:e2e

      - name: Upload docs Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-docs
          path: apps/docs/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

  web-e2e:
    name: web-e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @apps/web exec playwright install --with-deps chromium

      - name: Run web Playwright E2E
        run: pnpm --filter @apps/web test:e2e

      - name: Upload web Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-web
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 30

  publish-e2e-reports:
    name: publish-e2e-reports
    needs:
      - docs-e2e
      - web-e2e
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Prepare Pages directory
        run: mkdir -p .pages/docs .pages/web

      - name: Download docs Playwright report
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: playwright-report-docs
          path: .pages/docs

      - name: Download web Playwright report
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: playwright-report-web
          path: .pages/web

      - name: Create missing report placeholders
        run: |
          if [ ! -f .pages/docs/index.html ]; then
            cat > .pages/docs/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head><meta charset="utf-8"><title>Docs report unavailable</title></head>
            <body><h1>Docs report unavailable</h1><p>No docs Playwright report artifact was available for this run.</p></body>
          </html>
          HTML
          fi
          if [ ! -f .pages/web/index.html ]; then
            cat > .pages/web/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head><meta charset="utf-8"><title>Web report unavailable</title></head>
            <body><h1>Web report unavailable</h1><p>No web Playwright report artifact was available for this run.</p></body>
          </html>
          HTML
          fi

      - name: Create report index
        run: |
          cat > .pages/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Playwright E2E Reports</title>
              <style>
                :root {
                  color-scheme: light dark;
                  font-family:
                    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  background: Canvas;
                  color: CanvasText;
                }
                main {
                  width: min(720px, calc(100% - 48px));
                }
                h1 {
                  margin: 0 0 12px;
                  font-size: 2rem;
                  line-height: 1.2;
                }
                p {
                  margin: 0 0 24px;
                  color: color-mix(in srgb, CanvasText 70%, transparent);
                }
                ul {
                  display: grid;
                  gap: 12px;
                  padding: 0;
                  margin: 0;
                  list-style: none;
                }
                a {
                  display: block;
                  padding: 16px 18px;
                  border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
                  border-radius: 8px;
                  color: inherit;
                  text-decoration: none;
                  font-weight: 700;
                }
                a:hover,
                a:focus-visible {
                  border-color: color-mix(in srgb, CanvasText 46%, transparent);
                }
              </style>
            </head>
            <body>
              <main>
                <h1>Playwright E2E Reports</h1>
                <p>Reports generated by the latest main branch CI run.</p>
                <ul>
                  <li><a href="./docs/">Docs report</a></li>
                  <li><a href="./web/">Web report</a></li>
                </ul>
              </main>
            </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
